<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 715" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="tri" viewBox="0 0 20 20" refX="18" refY="10" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M2,2 L18,10 L2,18 Z" fill="white" stroke="black" stroke-width="1.5"/>
    </marker>
    <marker id="open" viewBox="0 0 20 20" refX="16" refY="10" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M4,3 L16,10 L4,17" fill="none" stroke="black" stroke-width="1.8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="715" fill="white"/>

  <!-- interface -->
  <rect x="320" y="20" width="330" height="140" fill="#f5f8ff" stroke="black"/>
  <text x="485" y="42" text-anchor="middle" font-style="italic">&#171;interface&#187;</text>
  <text x="485" y="62" text-anchor="middle" font-weight="bold">SystemInfoService</text>
  <line x1="320" y1="72" x2="650" y2="72" stroke="black"/>
  <text x="332" y="92" font-size="12.5">+ getOsInfo(): Promise&lt;OsInfo&gt;</text>
  <text x="332" y="110" font-size="12.5">+ getProcesses(): Promise&lt;ProcessInfo[]&gt;</text>
  <text x="332" y="128" font-size="12.5">+ getMemoryInfo(): Promise&lt;MemoryInfo&gt;</text>
  <text x="332" y="146" font-size="12.5">+ getDiskInfo(): Promise&lt;DiskInfo[]&gt;</text>

  <!-- realisation: base implements interface -->
  <line x1="480" y1="230" x2="480" y2="163" stroke="black" stroke-dasharray="6,4" marker-end="url(#tri)"/>

  <!-- abstract base -->
  <rect x="300" y="230" width="360" height="150" fill="#fffdf5" stroke="black"/>
  <text x="480" y="252" text-anchor="middle" font-style="italic">&#171;abstract&#187;</text>
  <text x="480" y="272" text-anchor="middle" font-weight="bold">BaseSystemInfoService</text>
  <line x1="300" y1="282" x2="660" y2="282" stroke="black"/>
  <text x="312" y="302" font-size="12.5">+ getOsInfo(): Promise&lt;OsInfo&gt;</text>
  <text x="312" y="320" font-size="12.5">+ getMemoryInfo(): Promise&lt;MemoryInfo&gt;</text>
  <text x="312" y="338" font-size="12.5" font-style="italic">+ getProcesses(): Promise&lt;ProcessInfo[]&gt; {abstract}</text>
  <text x="312" y="356" font-size="12.5" font-style="italic">+ getDiskInfo(): Promise&lt;DiskInfo[]&gt; {abstract}</text>

  <!-- generalisation arrows -->
  <line x1="230" y1="460" x2="388" y2="382" stroke="black" marker-end="url(#tri)"/>
  <line x1="730" y1="460" x2="572" y2="382" stroke="black" marker-end="url(#tri)"/>

  <!-- windows implementation -->
  <rect x="60" y="460" width="340" height="120" fill="white" stroke="black"/>
  <text x="230" y="483" text-anchor="middle" font-weight="bold">WindowsSystemInfoService</text>
  <line x1="60" y1="493" x2="400" y2="493" stroke="black"/>
  <text x="72" y="513" font-size="12.5">+ getProcesses(): Promise&lt;ProcessInfo[]&gt;</text>
  <text x="72" y="531" font-size="12.5">+ getDiskInfo(): Promise&lt;DiskInfo[]&gt;</text>
  <text x="72" y="560" font-size="11.5" fill="#666">PowerShell CIM queries, JSON output</text>

  <!-- linux implementation -->
  <rect x="560" y="460" width="340" height="120" fill="white" stroke="black"/>
  <text x="730" y="483" text-anchor="middle" font-weight="bold">LinuxSystemInfoService</text>
  <line x1="560" y1="493" x2="900" y2="493" stroke="black"/>
  <text x="572" y="511" font-size="12.5">+ getOsInfo(): Promise&lt;OsInfo&gt; &#171;override&#187;</text>
  <text x="572" y="529" font-size="12.5">+ getProcesses(): Promise&lt;ProcessInfo[]&gt;</text>
  <text x="572" y="547" font-size="12.5">+ getDiskInfo(): Promise&lt;DiskInfo[]&gt;</text>
  <text x="572" y="570" font-size="11.5" fill="#666">ps, df and /etc/os-release</text>

  <!-- factory -->
  <rect x="330" y="625" width="300" height="66" fill="#f5fff7" stroke="black"/>
  <text x="480" y="646" text-anchor="middle" font-weight="bold">SystemInfoServiceFactory</text>
  <line x1="330" y1="655" x2="630" y2="655" stroke="black"/>
  <text x="342" y="674" font-size="12.5">+ createSystemInfoService(platform)</text>

  <!-- creates dependencies -->
  <path d="M330,658 L230,658 L230,584" fill="none" stroke="black" stroke-dasharray="6,4" marker-end="url(#open)"/>
  <text x="240" y="648" font-size="11.5" font-style="italic">&#171;creates&#187;</text>
  <path d="M630,658 L730,658 L730,584" fill="none" stroke="black" stroke-dasharray="6,4" marker-end="url(#open)"/>
  <text x="640" y="648" font-size="11.5" font-style="italic">&#171;creates&#187;</text>

  <text x="20" y="706" font-size="11.5" fill="#666">IPC handlers and the renderer depend only on SystemInfoService; the factory is the sole place concrete platform classes are named.</text>
</svg>
